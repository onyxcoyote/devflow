[review]
base_ref = "upstream/master"
output_dir = ".devflow/reviews"
max_diff_chars = 40000
max_command_output_chars = 12000
# Saves the full prompt and raw LangChain response. This may contain source code,
# command output, or secrets, so enable it only when needed for debugging.
save_model_exchange = false

[serena]
context_input_target_tokens = 48000
max_round_tool_result_chars = 100000
output_dir = ".devflow/serena-context"
command = "serena"
args = ["start-mcp-server", "--context", "ide", "--project", "{repo}"]
max_rounds = 3
max_tool_calls_per_round = 12
max_total_tool_calls = 36
max_tool_result_chars = 8000
max_transcript_chars = 60000
max_report_output_tokens = 5000
model_request_min_interval_seconds = 2.0

[plan]
output_dir = ".devflow/plans"
save_model_exchange = false
max_output_tokens = 8000
compact_retry_output_tokens = 4000

[commands]
# These are trusted commands executed directly by devflow.
# The model cannot add or change commands.
check = [
  "npm run check",
]
test = [
  "npm test",
]

[model]
provider = "ollama"
model = "your-model-name"
base_url = "http://127.0.0.1:11434"
temperature = 0
